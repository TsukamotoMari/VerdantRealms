name: Build VerdantRealms Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5
        
    - name: Build mod
      run: gradle build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VerdantRealms-Mod
        path: build/libs/*.jar
        retention-days: 30
